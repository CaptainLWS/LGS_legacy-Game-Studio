<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Module Loader Integration Test</title>
  <style>body{font-family:sans-serif;color:#111;padding:12px}</style>
</head>
<body>
  <h1>Module Loader Integration Test</h1>
  <div id="result">Running...</div>
  <canvas id="game" width="320" height="240" style="border:1px solid #ccc"></canvas>
  <script type="module">
    import { createEngine } from '../engine.js';
    import { autoLoadAll } from '../module_loader.js';

    (async function(){
      const engine = createEngine('game');
      const modules = await autoLoadAll(engine);
      const keys = Object.keys(modules || {});
      const el = document.getElementById('result');
      if (keys.length >= 4) {
        el.textContent = 'PASS - modules loaded: ' + keys.join(', ');
        el.style.color = 'green';
      } else {
        el.textContent = 'FAIL - expected >=4 modules loaded, got: ' + keys.join(', ');
        el.style.color = 'red';
      }
    })();
  </script>
</body>
</html>
