name: Deploy engine examples
on:
  push:
    branches:
      - feature/engine-structure
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps (use lockfile if present)
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "Using npm ci (lockfile found)"
            npm ci
          else
            echo "No lockfile found — using npm install"
            npm install
          fi
        working-directory: .

      - name: Deploy engine folder to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4.4.0
        with:
          branch: gh-pages
          folder: engine
          token: ${{ secrets.GITHUB_TOKEN }}
