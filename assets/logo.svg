<svg
  width="800"
  height="800"
  viewBox="0 0 800 800"
  xmlns="http://www.w3.org/2000/svg"
>

  <!-- Background -->
  <rect width="800" height="800" fill="#000000" />

  <!-- Golden circular frame -->
  <circle
    cx="400"
    cy="280"
    r="220"
    fill="none"
    stroke="#D4AF37"
    stroke-width="30"
  />

  <!-- Radial glow behind panther -->
  <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFE9A3" />
    <stop offset="60%" stop-color="#D4AF37" />
    <stop offset="100%" stop-color="#000000" />
  </radialGradient>

  <circle
    cx="400"
    cy="280"
    r="190"
    fill="url(#goldGlow)"
  />

  <!-- Panther placeholder silhouette (replace with real path) -->
  <path
    d="M260 260
       C280 220 330 200 380 205
       C430 210 470 235 490 270
       C510 305 505 340 480 360
       C460 375 430 380 400 375
       C370 370 340 355 320 340
       C295 320 270 300 260 260 Z"
    fill="#000000"
  />

  <!-- Panther mouth highlight (simple accent) -->
  <path
    d="M380 290
       C395 285 410 285 425 295
       C430 305 430 315 420 325
       C405 330 390 330 380 320 Z"
    fill="#AA0000"
  />

  <!-- LEGACY text -->
  <text
    x="400"
    y="520"
    text-anchor="middle"
    font-family="Impact, Arial Black, sans-serif"
    font-size="80"
    fill="#C0C0C0"
    letter-spacing="8"
  >
    LEGACY
  </text>

  <!-- GAME STUDIOS text -->
  <text
    x="400"
    y="580"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="32"
    fill="#D4AF37"
    letter-spacing="6"
  >
    GAME STUDIOS
  </text>

</svg>
